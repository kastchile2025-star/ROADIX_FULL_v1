<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <!-- Background circle -->
  <circle cx="256" cy="256" r="240" fill="#1e40af"/>
  <circle cx="256" cy="256" r="220" fill="#2563eb"/>
  
  <!-- Gear outer ring -->
  <g transform="translate(256,256)">
    <!-- Gear teeth -->
    <path d="M0,-155 L15,-140 L15,-120 L30,-115 L45,-135 L65,-125 L55,-105 L65,-90 L85,-90 L90,-70 L110,-70 L105,-48 L120,-38 L135,-52 L148,-35 L130,-20 L135,-5 L155,0 L155,15 L135,20 L130,35 L148,48 L135,65 L120,52 L105,62 L110,85 L90,85 L85,105 L65,105 L55,118 L65,138 L45,148 L30,128 L15,135 L15,155 L0,155 L-15,155 L-15,135 L-30,128 L-45,148 L-65,138 L-55,118 L-65,105 L-85,105 L-90,85 L-110,85 L-105,62 L-120,52 L-135,65 L-148,48 L-130,35 L-135,20 L-155,15 L-155,0 L-135,-5 L-130,-20 L-148,-35 L-135,-52 L-120,-38 L-105,-48 L-110,-70 L-90,-70 L-85,-90 L-65,-90 L-55,-105 L-65,-125 L-45,-135 L-30,-115 L-15,-120 L-15,-140 Z" fill="#60a5fa" opacity="0.3"/>
    
    <!-- Inner gear circle -->
    <circle cx="0" cy="0" r="95" fill="#2563eb"/>
    <circle cx="0" cy="0" r="75" fill="#1e40af" opacity="0.5"/>
  </g>
  
  <!-- Wrench -->
  <g transform="translate(256,256) rotate(-45)">
    <!-- Wrench handle -->
    <rect x="-12" y="-20" width="24" height="100" rx="8" fill="white"/>
    <!-- Wrench head top -->
    <path d="M-28,-45 Q-28,-75 0,-80 Q28,-75 28,-45 L20,-25 L-20,-25 Z" fill="white"/>
    <path d="M-15,-45 Q-15,-65 0,-68 Q15,-65 15,-45 L12,-32 L-12,-32 Z" fill="#2563eb"/>
    <!-- Wrench bottom -->
    <rect x="-8" y="70" width="16" height="30" rx="4" fill="white" opacity="0.9"/>
  </g>
  
  <!-- Lightning bolt (smart/digital) -->
  <g transform="translate(310,170)">
    <polygon points="0,0 -20,40 5,35 -10,70 30,22 8,28 22,0" fill="#fbbf24"/>
  </g>
  
  <!-- Text arc: "SMART" -->
  <text x="256" y="430" text-anchor="middle" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="52" fill="white" letter-spacing="8">SMART</text>
  <text x="256" y="470" text-anchor="middle" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="36" fill="#60a5fa" letter-spacing="12">MEC</text>
</svg>

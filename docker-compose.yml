services:
  postgres:
    image: postgres:16-alpine
    container_name: roadix-db
    environment:
      POSTGRES_DB: roadix
      POSTGRES_USER: roadix_user
      POSTGRES_PASSWORD: roadix_dev_pass
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: roadix-redis
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: roadix-api
    ports:
      - "3000:3000"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: roadix_user
      DB_PASSWORD: roadix_dev_pass
      DB_DATABASE: roadix
      JWT_SECRET: change-me-min-32-chars-in-production
      JWT_REFRESH_SECRET: change-me-min-32-chars-in-production
      REDIS_URL: redis://redis:6379
      APP_URL: http://localhost:5173
    depends_on:
      - postgres
      - redis

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: roadix-web
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  pgdata:

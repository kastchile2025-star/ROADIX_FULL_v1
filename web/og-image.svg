<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img">
  <!-- Background -->
  <rect width="1200" height="630" fill="#0f172a"/>
  <!-- Subtle grid -->
  <defs>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#1e293b" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <!-- Gradient overlay -->
  <radialGradient id="glow" cx="50%" cy="50%" r="60%">
    <stop offset="0%" stop-color="#0ea5e9" stop-opacity="0.08"/>
    <stop offset="100%" stop-color="#0f172a" stop-opacity="0"/>
  </radialGradient>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Logo mark (centered left) -->
  <g transform="translate(240, 195) scale(5.5)">
    <rect x="1" y="1" width="42" height="42" rx="11" fill="#0f172a" stroke="#2bbef9" stroke-width="1.5"/>
    <path d="M10 31 A13 13 0 1 1 34 31" fill="none" stroke="#2bbef9" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="22" y1="28" x2="29" y2="16" stroke="#ffb648" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="22" cy="28" r="2.5" fill="#ffb648"/>
    <line x1="11" y1="34" x2="33" y2="34" stroke="#2bbef9" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
  </g>

  <!-- Wordmark -->
  <text x="590" y="295" font-family="system-ui, -apple-system, sans-serif" font-size="108" font-weight="700" fill="white" text-anchor="middle" letter-spacing="-2">Roadix</text>

  <!-- Tagline -->
  <text x="590" y="375" font-family="system-ui, -apple-system, sans-serif" font-size="36" font-weight="300" fill="#94a3b8" text-anchor="middle">Gestión de talleres automotrices modernos</text>

  <!-- Accent line -->
  <rect x="440" y="410" width="320" height="3" rx="2" fill="#2bbef9" opacity="0.5"/>

  <!-- URL -->
  <text x="590" y="470" font-family="system-ui, -apple-system, sans-serif" font-size="26" fill="#475569" text-anchor="middle">www.roadix.cl</text>
</svg>
